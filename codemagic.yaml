workflows:
  ios-workflow:
    name: RankRiot iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: RankRiot Key # This MUST match the name you gave the integration in Step 1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.holdenweinberg.rankriot"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          # We use the bundle ID directly to ensure no environment variable mishaps
          app-store-connect fetch-signing-files "com.holdenweinberg.rankriot" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: Build iOS IPA
        script: |
          # This creates the actual .ipa file for the App Store
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - hweinberg123@gmail.com