workflows:
  ios-workflow:
    name: RankRiot iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: RankRiot Key 
    environment:
      node: latest
      xcode: latest
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj" 
        XCODE_SCHEME: "App"
        APP_ID: "com.holdenweinberg.rankriot"
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install @capacitor/ios
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Set up code signing & Force Create Profile
        script: |
          # 1. Force the Xcode project to use your exact Bundle ID so the profile maps correctly
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = $APP_ID;/g" "$XCODE_PROJECT/project.pbxproj"
          
          # 2. Fetch and forcefully create the App Store profile on Apple's servers
          keychain initialize
          app-store-connect fetch-signing-files "$APP_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          
          # 3. Inject the keys into the newly updated Xcode project
          xcode-project use-profiles --project "$XCODE_PROJECT"
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - hweinberg123@gmail.com