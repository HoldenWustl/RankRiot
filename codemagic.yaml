workflows:
  ios-workflow:
    name: RankRiot iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: RankRiot Key 
    environment:
      node: latest
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.holdenweinberg.rankriot
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj" 
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install @capacitor/ios
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles --project "$XCODE_PROJECT"
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - hweinberg123@gmail.com